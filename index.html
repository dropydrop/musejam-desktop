<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MuseJam V18</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <script type="module" src="/src/main.ts" defer></script>
</head>
<body>

<div class="topbar">
  <button class="btn-fs" id="fsBtn">⛶</button>
  <span class="logo">MuseJam <span style="font-size:0.62rem;color:var(--muted);font-weight:400;letter-spacing:0.5px;">V18</span></span>
  <select id="tonality"><option value="Am">La min</option><option value="C">Do maj</option></select>
  <select id="difficulty"><option value="doux">Doux</option><option value="medium" selected>Medium</option><option value="spicy">Spicy</option></select>
  <select id="mesures"><option value="2">2 mesures</option><option value="4" selected>4 mesures</option><option value="8">8 mesures</option></select>
  <button class="btn-new" id="newCardBtn">Nouvelle session</button>
  <button class="btn-regen" id="regenRhythmBtn">Nouveau Rythme</button>
  <button class="btn-lockchord" id="lockAllChordsBtn">🔓 Accords</button>
  <button class="btn-lockrythm" id="lockAllRythmsBtn">🎶 Rythmes</button>
  <button class="btn-visual" id="visToggle">🎹 Musethesia</button>
  <button class="play-btn" id="playBtnTop">▶</button>
</div>

<div class="edit-banner">✏️ Mode édition — clique les cases · <kbd style="background:rgba(255,255,255,0.1);border-radius:3px;padding:1px 4px;font-family:monospace;">E</kbd> ou ▶ pour quitter</div>

<div class="main">
  <div class="panel panel-left" id="panelLeft"></div>
  <div class="panel panel-right" id="panelRight"></div>
</div>

<div class="musethesia-view" id="museThesiaView" style="display:none;">
  <div class="musethesia-overlay-info" id="museThesiaOverlayInfo"></div>
  <canvas id="fallCanvas"></canvas>
  <div id="impactLine"></div>
  <div class="musethesia-piano" id="museThesiaPiano"></div>
</div>

<div class="bottom-bar">
  <span class="session-info" id="sessionInfo">Session 1 · 4 mesures · medium</span>
  <button class="hist-btn-bottom" id="histBtn">⏱ Historique</button>
</div>

<div class="hist-overlay" id="histOverlay">
  <div class="hist-drawer">
    <div class="hist-header">
      <h2>Historique</h2>
      <button class="hist-close" id="histClose">×</button>
    </div>
    <div class="hist-grid" id="histGrid"></div>
  </div>
</div>

  <!-- Indicateur MIDI (optionnel) -->
  <div id="midi-status" style="position:fixed;bottom:10px;left:10px;font-size:12px;color:#888;">
    ⚡ MIDI: <span id="midi-count">0</span> périphérique(s)
  </div>

</body>
</html>
